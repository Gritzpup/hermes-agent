provider: minimax
model: MiniMax-M2.7-highspeed
agent:
  max_turns: 90
  iteration_budget: 10000
onboarding:
  seen:
    busy_input_prompt: true
    tool_progress_prompt: true
display:
  skin: gurbridge

auxiliary:
  vision:
    provider: minimax
    timeout: 60
  web_extract:
    provider: auto
    timeout: 120
  compression:
    provider: auto

mcp_servers:
  playwright:
    command: npx
    args:
      - "@playwright/mcp"
      - "--browser"
      - "chrome"
      - "--headless"
      - "--caps"
      - "vision,devtools"
      - "--user-data-dir"
      - "/tmp/playwright-mcp-chrome-profile"
      - "--viewport-size"
      - "1280x720"
      - "--no-sandbox"
    env:
      DISPLAY: ":99"
    timeout: 30
    connect_timeout: 30
