provider: minimax
model: MiniMax-M2.7-highspeed
agent:
  max_turns: 90
  iteration_budget: 10000
onboarding:
  seen:
    busy_input_prompt: true
    tool_progress_prompt: true
display:
  skin: gurbridge

auxiliary:
  vision:
    provider: minimax
    timeout: 60
  web_extract:
    provider: auto
    timeout: 120
  compression:
    provider: auto

mcp_servers:
  playwright:
    command: npx
    args:
      - "@playwright/mcp"
      # Attach to gurbridge's existing chromium via CDP instead of spawning
      # a separate headless browser. Gurbridge launches chromium with
      # --remote-debugging-port=9222 (see server/browser/core.ts), so this
      # MCP shares the same browser the user sees in the Browser Board pane.
      - "--cdp-endpoint"
      - "http://127.0.0.1:9222"
      - "--caps"
      - "vision,devtools"
    timeout: 30
    connect_timeout: 30

  # MiniMax MCP server — exposes two tools:
  #   • understand_image — vision analysis (JPEG/PNG/GIF/WebP, ≤20MB) via
  #     URL or local file path
  #   • web_search       — web search via the MiniMax search backend
  # Per https://platform.minimax.io/docs/token-plan/mcp-guide
  # The package is auto-installed by `uvx` on first run.
  MiniMax:
    command: uvx
    args:
      - "minimax-coding-plan-mcp"
      - "-y"
    env:
      MINIMAX_API_KEY: "${MINIMAX_API_KEY}"
      MINIMAX_API_HOST: "https://api.minimax.io"
    timeout: 30
    connect_timeout: 60
